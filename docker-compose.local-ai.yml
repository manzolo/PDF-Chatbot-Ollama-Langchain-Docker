# Local AI Lab override — join the shared `local-ai-net` Docker network
# and use the family Ollama instance (container `ollama`, port 11434).
# Convention: https://github.com/manzolo/local-ai-lab#conventions
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.local-ai.yml up -d

services:
  ollama_agent:
    networks:
      - default
      - local-ai-net
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}

networks:
  local-ai-net:
    external: true
